<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lični komandni centar</title>
<style>
  :root {
    --bg: #0b1220;
    --bg-panel: #111a2e;
    --border: #1f2c47;
    --text: #e2e8f0;
    --text-muted: #8291ab;
    --accent: #4f8cff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background-color: var(--bg);
    color: var(--text);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background-color: var(--bg-panel);
  }

  header h1 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  #datum {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .zaglavlje-desno {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .zaglavlje-desno > * {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 20px;
    border-right: 1px solid var(--border);
  }

  .zaglavlje-desno > *:last-child {
    padding-right: 0;
    border-right: none;
  }

  .widget-ikona {
    font-size: 1.2rem;
    line-height: 1;
  }

  .widget-vrednost {
    color: var(--accent);
    font-weight: 700;
  }

  .widget-labela {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  main {
    padding: 32px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 24px;
  }

  section {
    background-color: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    min-height: 200px;
  }

  section h2 {
    margin: 0 0 8px 0;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  #sekcija-statistika {
    grid-column: 1 / span 2;
  }

  .unos-red {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .unos-red input {
    flex: 1;
    padding: 10px 12px;
    background-color: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
  }

  .unos-red input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .unos-red button {
    padding: 10px 18px;
    background-color: var(--accent);
    border: none;
    border-radius: 8px;
    color: #0b1220;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .unos-red button:hover {
    opacity: 0.9;
  }

  #lista-zadataka {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #lista-zadataka li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    background-color: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
  }

  #lista-zadataka li span {
    flex: 1;
    word-break: break-word;
  }

  #lista-zadataka li.zavrsen span {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  #lista-zadataka li button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
  }

  #lista-zadataka li button:hover {
    color: var(--accent);
  }

  #lista-navika {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #lista-navika li {
    padding: 12px;
    background-color: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .navika-zaglavlje {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .navika-naziv {
    flex: 1;
    word-break: break-word;
  }

  .navika-niz {
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .navika-zaglavlje button {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    padding: 2px 6px;
  }

  .navika-zaglavlje button:hover {
    color: var(--accent);
  }

  .krugovi {
    display: flex;
    gap: 8px;
  }

  .krug {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    box-sizing: border-box;
  }

  .krug.popunjen {
    background-color: var(--accent);
    border-color: var(--accent);
  }

  .krug.danas {
    border-color: var(--text-muted);
    cursor: pointer;
  }

  .krug.danas:hover {
    border-color: var(--accent);
  }

  .stat-red {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-karta {
    background-color: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .stat-vrednost {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-vrednost button {
    width: 28px;
    height: 28px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
  }

  .stat-vrednost button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .stat-labela {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .napredak-zaglavlje {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .traka-napretka {
    width: 100%;
    height: 12px;
    background-color: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }

  .traka-popuna {
    height: 100%;
    background-color: var(--accent);
    border-radius: 999px;
    transition: width 0.3s ease;
  }
</style>
</head>
<body>

  <header>
    <h1>Lični <span>komandni centar</span></h1>
    <div class="zaglavlje-desno">
      <div id="widget-vreme">
        <span class="widget-ikona" id="vreme-ikona">–</span>
        <span class="widget-vrednost" id="vreme-temp">–</span>
        <span class="widget-labela">Derventa</span>
      </div>
      <div id="widget-kurs">
        <span class="widget-labela">EUR/USD</span>
        <span class="widget-vrednost" id="kurs-usd">–</span>
        <span class="widget-labela">EUR/CHF</span>
        <span class="widget-vrednost" id="kurs-chf">–</span>
      </div>
      <div id="datum"></div>
    </div>
  </header>

  <main>
    <section id="sekcija-zadaci">
      <h2>Zadaci</h2>
      <div class="unos-red">
        <input type="text" id="unos-zadatak" placeholder="Novi zadatak...">
        <button id="dugme-dodaj">Dodaj</button>
      </div>
      <ul id="lista-zadataka"></ul>
    </section>

    <section id="sekcija-navike">
      <h2>Navike</h2>
      <div class="unos-red">
        <input type="text" id="unos-navika" placeholder="Nova navika...">
        <button id="dugme-dodaj-navika">Dodaj</button>
      </div>
      <ul id="lista-navika"></ul>
    </section>

    <section id="sekcija-statistika">
      <h2>Statistika</h2>
      <div class="stat-red">
        <div class="stat-karta">
          <div class="stat-vrednost" id="stat-sedmica">-</div>
          <div class="stat-labela">Sedmica kursa</div>
        </div>
        <div class="stat-karta">
          <div class="stat-vrednost" id="stat-zadaci">0</div>
          <div class="stat-labela">Završenih zadataka</div>
        </div>
        <div class="stat-karta">
          <div class="stat-vrednost">
            <button id="dugme-projekti-minus">−</button>
            <span id="stat-projekti">1</span>
            <button id="dugme-projekti-plus">+</button>
          </div>
          <div class="stat-labela">Završenih projekata</div>
        </div>
      </div>
      <div class="napredak-kursa">
        <div class="napredak-zaglavlje">
          <span>Napredak kursa</span>
          <span id="napredak-procenat">0%</span>
        </div>
        <div class="traka-napretka">
          <div class="traka-popuna" id="traka-popuna"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const elementDatum = document.getElementById("datum");
    const danas = new Date();
    const opcije = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
    elementDatum.textContent = danas.toLocaleDateString("sr-Latn-RS", opcije);

    /* ---------- WIDGET: VRIJEME (Open-Meteo, bez API ključa) ---------- */
    const KOORDINATE_GRADA = { lat: 44.98, lon: 17.91 }; // Derventa

    /* WMO weather_code -> ikonica. Grupe kodova su iz Open-Meteo dokumentacije. */
    function ikonaZaVremenskiKod(kod) {
      if (kod === 0) return "☀️";
      if ([1, 2, 3].includes(kod)) return "⛅";
      if ([45, 48].includes(kod)) return "🌫️";
      if ([51, 53, 55, 56, 57].includes(kod)) return "🌦️";
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(kod)) return "🌧️";
      if ([71, 73, 75, 77, 85, 86].includes(kod)) return "🌨️";
      if ([95, 96, 99].includes(kod)) return "⛈️";
      return "🌡️";
    }

    async function ucitajVreme() {
      const elementIkona = document.getElementById("vreme-ikona");
      const elementTemp = document.getElementById("vreme-temp");
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${KOORDINATE_GRADA.lat}&longitude=${KOORDINATE_GRADA.lon}&current=temperature_2m,weather_code`;
        const odgovor = await fetch(url);
        if (!odgovor.ok) throw new Error("Server je odgovorio greškom");
        const podaci = await odgovor.json();
        elementIkona.textContent = ikonaZaVremenskiKod(podaci.current.weather_code);
        elementTemp.textContent = Math.round(podaci.current.temperature_2m) + "°C";
      } catch (greska) {
        // Nema interneta, API ne radi ili je odgovor neispravan — crtica umjesto pada aplikacije.
        elementIkona.textContent = "–";
        elementTemp.textContent = "–";
      }
    }

    /* ---------- WIDGET: KURSNA LISTA (frankfurter.app, bez API ključa) ---------- */
    async function ucitajKurs() {
      const elementUsd = document.getElementById("kurs-usd");
      const elementChf = document.getElementById("kurs-chf");
      try {
        const odgovor = await fetch("https://api.frankfurter.app/latest?from=EUR&to=USD,CHF");
        if (!odgovor.ok) throw new Error("Server je odgovorio greškom");
        const podaci = await odgovor.json();
        elementUsd.textContent = podaci.rates.USD.toFixed(2);
        elementChf.textContent = podaci.rates.CHF.toFixed(2);
      } catch (greska) {
        elementUsd.textContent = "–";
        elementChf.textContent = "–";
      }
    }

    ucitajVreme();
    ucitajKurs();

    const KLJUC_ZADACI = "komandni-centar-zadaci";
    const unosZadatak = document.getElementById("unos-zadatak");
    const dugmeDodaj = document.getElementById("dugme-dodaj");
    const listaZadataka = document.getElementById("lista-zadataka");

    function ucitajZadatke() {
      const sacuvano = localStorage.getItem(KLJUC_ZADACI);
      return sacuvano ? JSON.parse(sacuvano) : [];
    }

    function sacuvajZadatke(zadaci) {
      localStorage.setItem(KLJUC_ZADACI, JSON.stringify(zadaci));
    }

    let zadaci = ucitajZadatke();

    function iscrtajZadatke() {
      listaZadataka.innerHTML = "";
      zadaci.forEach((zadatak, indeks) => {
        const stavka = document.createElement("li");
        if (zadatak.zavrsen) stavka.classList.add("zavrsen");

        const tekst = document.createElement("span");
        tekst.textContent = zadatak.tekst;

        const dugmeObrisi = document.createElement("button");
        dugmeObrisi.textContent = "×";
        dugmeObrisi.addEventListener("click", (dogadjaj) => {
          dogadjaj.stopPropagation();
          zadaci.splice(indeks, 1);
          sacuvajZadatke(zadaci);
          iscrtajZadatke();
        });

        stavka.addEventListener("click", () => {
          zadatak.zavrsen = !zadatak.zavrsen;
          sacuvajZadatke(zadaci);
          iscrtajZadatke();
        });

        stavka.appendChild(tekst);
        stavka.appendChild(dugmeObrisi);
        listaZadataka.appendChild(stavka);
      });
      iscrtajStatistiku();
    }

    function dodajZadatak() {
      const vrednost = unosZadatak.value.trim();
      if (!vrednost) return;
      zadaci.push({ tekst: vrednost, zavrsen: false });
      sacuvajZadatke(zadaci);
      iscrtajZadatke();
      unosZadatak.value = "";
      unosZadatak.focus();
    }

    dugmeDodaj.addEventListener("click", dodajZadatak);
    unosZadatak.addEventListener("keydown", (dogadjaj) => {
      if (dogadjaj.key === "Enter") dodajZadatak();
    });

    const KLJUC_NAVIKE = "komandni-centar-navike";
    const unosNavika = document.getElementById("unos-navika");
    const dugmeDodajNavika = document.getElementById("dugme-dodaj-navika");
    const listaNavika = document.getElementById("lista-navika");

    function formatDatum(datum) {
      const godina = datum.getFullYear();
      const mesec = String(datum.getMonth() + 1).padStart(2, "0");
      const dan = String(datum.getDate()).padStart(2, "0");
      return `${godina}-${mesec}-${dan}`;
    }

    function poslednjihSedamDana() {
      const dani = [];
      for (let i = 6; i >= 0; i--) {
        const datum = new Date();
        datum.setDate(datum.getDate() - i);
        dani.push(formatDatum(datum));
      }
      return dani;
    }

    function izracunajNiz(dani) {
      const datum = new Date();
      if (!dani.includes(formatDatum(datum))) {
        datum.setDate(datum.getDate() - 1);
      }
      let niz = 0;
      while (dani.includes(formatDatum(datum))) {
        niz++;
        datum.setDate(datum.getDate() - 1);
      }
      return niz;
    }

    function ucitajNavike() {
      const sacuvano = localStorage.getItem(KLJUC_NAVIKE);
      return sacuvano ? JSON.parse(sacuvano) : [];
    }

    function sacuvajNavike(navike) {
      localStorage.setItem(KLJUC_NAVIKE, JSON.stringify(navike));
    }

    let navike = ucitajNavike();

    function iscrtajNavike() {
      listaNavika.innerHTML = "";
      const danas = formatDatum(new Date());
      const poslednjihDana = poslednjihSedamDana();

      navike.forEach((navika, indeks) => {
        const stavka = document.createElement("li");

        const zaglavlje = document.createElement("div");
        zaglavlje.className = "navika-zaglavlje";

        const naziv = document.createElement("span");
        naziv.className = "navika-naziv";
        naziv.textContent = navika.naziv;

        const niz = document.createElement("span");
        niz.className = "navika-niz";
        niz.textContent = `🔥 ${izracunajNiz(navika.dani)}`;

        const dugmeObrisi = document.createElement("button");
        dugmeObrisi.textContent = "×";
        dugmeObrisi.addEventListener("click", () => {
          navike.splice(indeks, 1);
          sacuvajNavike(navike);
          iscrtajNavike();
        });

        zaglavlje.appendChild(naziv);
        zaglavlje.appendChild(niz);
        zaglavlje.appendChild(dugmeObrisi);

        const krugovi = document.createElement("div");
        krugovi.className = "krugovi";

        poslednjihDana.forEach((datumString) => {
          const krug = document.createElement("div");
          krug.className = "krug";
          if (navika.dani.includes(datumString)) krug.classList.add("popunjen");
          if (datumString === danas) {
            krug.classList.add("danas");
            krug.addEventListener("click", () => {
              const pozicija = navika.dani.indexOf(danas);
              if (pozicija === -1) {
                navika.dani.push(danas);
              } else {
                navika.dani.splice(pozicija, 1);
              }
              sacuvajNavike(navike);
              iscrtajNavike();
            });
          }
          krugovi.appendChild(krug);
        });

        stavka.appendChild(zaglavlje);
        stavka.appendChild(krugovi);
        listaNavika.appendChild(stavka);
      });
    }

    function dodajNaviku() {
      const vrednost = unosNavika.value.trim();
      if (!vrednost) return;
      navike.push({ naziv: vrednost, dani: [] });
      sacuvajNavike(navike);
      iscrtajNavike();
      unosNavika.value = "";
      unosNavika.focus();
    }

    dugmeDodajNavika.addEventListener("click", dodajNaviku);
    unosNavika.addEventListener("keydown", (dogadjaj) => {
      if (dogadjaj.key === "Enter") dodajNaviku();
    });

    const KLJUC_PROJEKTI = "komandni-centar-projekti";
    const POCETAK_KURSA = new Date(2026, 6, 6);
    const UKUPNO_SEDMICA = 26;

    const elementStatSedmica = document.getElementById("stat-sedmica");
    const elementStatZadaci = document.getElementById("stat-zadaci");
    const elementStatProjekti = document.getElementById("stat-projekti");
    const dugmeProjektiMinus = document.getElementById("dugme-projekti-minus");
    const dugmeProjektiPlus = document.getElementById("dugme-projekti-plus");
    const elementNapredakProcenat = document.getElementById("napredak-procenat");
    const elementTrakaPopuna = document.getElementById("traka-popuna");

    function ucitajProjekte() {
      const sacuvano = localStorage.getItem(KLJUC_PROJEKTI);
      return sacuvano !== null ? Number(sacuvano) : 1;
    }

    function sacuvajProjekte(broj) {
      localStorage.setItem(KLJUC_PROJEKTI, String(broj));
    }

    let zavrseniProjekti = ucitajProjekte();

    function izracunajProgresKursa() {
      const danas = new Date();
      danas.setHours(0, 0, 0, 0);
      const pocetak = new Date(POCETAK_KURSA);
      pocetak.setHours(0, 0, 0, 0);
      const ukupnoDana = UKUPNO_SEDMICA * 7;
      const proteklihDana = Math.floor((danas - pocetak) / (1000 * 60 * 60 * 24));
      const proteklihDanaOgranicen = Math.min(Math.max(proteklihDana, 0), ukupnoDana);
      const trenutnaSedmica = Math.min(Math.max(Math.floor(proteklihDana / 7) + 1, 1), UKUPNO_SEDMICA);
      const procenat = Math.round((proteklihDanaOgranicen / ukupnoDana) * 100);
      return { trenutnaSedmica, procenat };
    }

    function iscrtajStatistiku() {
      const { trenutnaSedmica, procenat } = izracunajProgresKursa();
      elementStatSedmica.textContent = `${trenutnaSedmica} / ${UKUPNO_SEDMICA}`;
      elementStatZadaci.textContent = zadaci.filter((zadatak) => zadatak.zavrsen).length;
      elementStatProjekti.textContent = zavrseniProjekti;
      elementNapredakProcenat.textContent = `${procenat}%`;
      elementTrakaPopuna.style.width = `${procenat}%`;
    }

    dugmeProjektiMinus.addEventListener("click", () => {
      zavrseniProjekti = Math.max(0, zavrseniProjekti - 1);
      sacuvajProjekte(zavrseniProjekti);
      iscrtajStatistiku();
    });

    dugmeProjektiPlus.addEventListener("click", () => {
      zavrseniProjekti++;
      sacuvajProjekte(zavrseniProjekti);
      iscrtajStatistiku();
    });

    iscrtajZadatke();
    iscrtajNavike();
  </script>

</body>
</html>
