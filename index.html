<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lični komandni centar</title>
<style>
  :root {
    --bg: #0b1220;
    --bg-panel: #111a2e;
    --border: #1f2c47;
    --text: #e2e8f0;
    --text-muted: #8291ab;
    --accent: #4f8cff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background-color: var(--bg);
    color: var(--text);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    background-color: var(--bg-panel);
  }

  header h1 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  #datum {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  main {
    padding: 32px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 24px;
  }

  section {
    background-color: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    min-height: 200px;
  }

  section h2 {
    margin: 0 0 8px 0;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  #sekcija-statistika {
    grid-column: 1 / span 2;
  }
</style>
</head>
<body>

  <header>
    <h1>Lični <span>komandni centar</span></h1>
    <div id="datum"></div>
  </header>

  <main>
    <section id="sekcija-zadaci">
      <h2>Zadaci</h2>
    </section>

    <section id="sekcija-navike">
      <h2>Navike</h2>
    </section>

    <section id="sekcija-statistika">
      <h2>Statistika</h2>
    </section>
  </main>

  <script>
    const elementDatum = document.getElementById("datum");
    const danas = new Date();
    const opcije = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
    elementDatum.textContent = danas.toLocaleDateString("sr-Latn-RS", opcije);
  </script>

</body>
</html>
